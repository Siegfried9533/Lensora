spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/LensoraDB}
spring.datasource.username=postgres
spring.datasource.password=Hoalt@2005

# Hiển thị các câu lệnh SQL được thực thi trong console để dễ dàng debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chỉ định phương thức SQL cho PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cấu hình Jackson để Android nhận định dạng ngày tháng chuẩn
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss

# Cấu hình flyway để quản lý migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Chỉ validate schema sau khi Flyway tạo bảng
spring.jpa.hibernate.ddl-auto=validate