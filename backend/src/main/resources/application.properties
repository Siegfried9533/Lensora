spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/LensoraDB}
spring.datasource.username=postgres
spring.datasource.password=Hoalt@2005

# Hiển thị các câu lệnh SQL được thực thi trong console để dễ dàng debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chỉ định phương thức SQL cho PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cấu hình Jackson để Android nhận định dạng ngày tháng chuẩn
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss

# Cấu hình flyway để quản lý migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Chỉ validate schema sau khi Flyway tạo bảng
spring.jpa.hibernate.ddl-auto=validate
app.jwt.secret=${APP_JWT_SECRET:change-me-change-me-change-me-change-me-32chars}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:8081}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:no-reply@lensora.local}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}

app.ghn.api-url=${APP_GHN_API_URL:https://online-gateway.ghn.vn}
app.ghn.shop-id=${APP_GHN_SHOP_ID:0}
app.ghn.token=${APP_GHN_TOKEN:}
app.ghn.district-id=${APP_GHN_DISTRICT_ID:0}

app.momo.partner-code=${APP_MOMO_PARTNER_CODE:}
app.momo.access-key=${APP_MOMO_ACCESS_KEY:}
app.momo.secret-key=${APP_MOMO_SECRET_KEY:}
app.momo.url=${APP_MOMO_URL:https://test-payment.momo.vn/v2/gateway/api/create}
app.momo.redirect-url=${APP_MOMO_REDIRECT_URL:http://localhost:8081/payment/momo/redirect}
app.momo.ipn-url=${APP_MOMO_IPN_URL:http://localhost:8080/api/payments/momo/ipn}
